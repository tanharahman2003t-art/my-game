<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thief Tracker - Chase Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div>Score: <span id="score">0</span></div>
        </div>
        <div id="start-screen" class="overlay">
            <h1 style="color: #00f2ff; font-size: 40px; margin-bottom: 10px;">THIEF CHASE</h1>
            <p style="color: #ccc; margin-bottom: 25px;">Catch the thief! Avoid red obstacles.</p>
            <button id="start-btn">START CHASE</button>
            <p style="color: #666; margin-top: 20px; font-size: 14px;">Arrows: Move/Jump/Slide</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
