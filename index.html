<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NEON CHASE — 3D Street Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background layers -->
  <div id="bg-layer">
    <div class="grid-floor"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
  </div>

  <div id="root">

    <!-- ═══════════ START SCREEN ═══════════ -->
    <div id="startScreen" class="screen active">
      <div class="logo-wrap">
        <div class="logo-sub">CYBER DIVISION — UNIT 7</div>
        <div class="logo-title">NEON<br/>CHASE</div>
        <div class="logo-version">PRO v3.0 · 3D EDITION</div>
      </div>
      <div class="start-instructions">
        <div class="inst-row"><span class="key">←</span><span class="key">→</span> Switch Lanes</div>
        <div class="inst-row"><span class="key-pill">S</span> Shield &nbsp;·&nbsp; <span class="key-pill">R</span> Rapid Fire &nbsp;·&nbsp; <span class="key-pill">♥</span> Extra Life</div>
      </div>
      <button class="btn-primary" id="startBtn">
        <span class="btn-glow"></span>
        INITIATE CHASE
      </button>
      <div class="objective">Hit the thief <strong>10 times</strong>. Don't crash. Don't die.</div>
    </div>

    <!-- ═══════════ GAME SCREEN ═══════════ -->
    <div id="gameScreen" class="screen">

      <!-- HUD top bar -->
      <div id="hud">
        <div class="hud-block">
          <div class="hud-label">TARGET</div>
          <div class="bar-track"><div id="hitBar"></div></div>
          <div class="hud-val" id="hitCount">0 / 10</div>
        </div>
        <div class="hud-center">
          <div class="hud-label">LEVEL</div>
          <div class="hud-lvl" id="levelNum">01</div>
        </div>
        <div class="hud-block right">
          <div class="hud-label">SCORE</div>
          <div class="hud-val" id="scoreVal">000000</div>
          <div id="livesRow"></div>
        </div>
      </div>

      <!-- Status banner (combo, powerup) -->
      <div id="statusBanner"></div>

      <!-- 3D CANVAS -->
      <canvas id="gc"></canvas>

      <!-- Mobile controls -->
      <div id="mobileCtrl">
        <button class="mBtn" id="mLeft">&#9664;</button>
        <div class="mBtn-center"></div>
        <button class="mBtn" id="mRight">&#9654;</button>
      </div>

    </div>

    <!-- ═══════════ GAME OVER SCREEN ═══════════ -->
    <div id="gameoverScreen" class="screen">
      <div class="go-badge" id="goBadge">MISSION FAILED</div>
      <div class="go-title" id="goTitle">ELIMINATED</div>
      <p class="go-msg" id="goMsg">You ran out of lives.</p>
      <div class="go-stats" id="goStats"></div>
      <button class="btn-primary" onclick="location.reload()">&#8635; &nbsp; RETRY MISSION</button>
    </div>

  </div><!-- /#root -->

  <script src="game.js"></script>
</body>
</html>
