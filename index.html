<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thief Tracker - The Final Chase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="stat">Hits: <span id="hits">0</span>/10</div>
            <div class="stat">Score: <span id="score">0</span></div>
        </div>
        <div id="overlay" class="screen">
            <h1 id="title">THE CHASE</h1>
            <p id="msg">Catch the thief 10 times to win!</p>
            <button id="start-btn">START MISSION</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
