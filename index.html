<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chase Runner Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP UI BAR -->
<div class="top-bar">
  <div class="logo">🔥 Chase Runner</div>

  <div class="stats">
    <div class="card">Score: <span id="score">0</span></div>
    <div class="card">Ammo: <span id="ammo">0</span></div>
    <div class="card">Hits: <span id="hits">0 / 10</span></div>
  </div>
</div>

<!-- GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- START SCREEN -->
<div id="startScreen" class="overlay">
  <h1>🔥 Chase the Thief</h1>
  <p>Collect ammo, avoid obstacles, shoot the thief!</p>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="overlay hidden">
  <h1>💀 Game Over</h1>
  <button onclick="restartGame()">Restart</button>
</div>

<!-- WIN SCREEN -->
<div id="winScreen" class="overlay hidden">
  <h1>🏆 You Caught the Thief!</h1>
  <button onclick="restartGame()">Play Again</button>
</div>

<script src="game.js"></script>
</body>
</html>
