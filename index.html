<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <title>NEON CHASE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <canvas id="gc"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-left">
      <div class="hlabel">SCORE</div>
      <div id="hScore">0</div>
    </div>
    <div class="hud-center">
      <div class="hlabel">LEVEL</div>
      <div id="hLevel">1</div>
    </div>
    <div class="hud-right">
      <div class="hlabel">LIVES</div>
      <div id="hLives">❤❤❤</div>
    </div>
  </div>

  <div id="hud-bottom" class="hidden">
    <div id="shieldBar" class="bar-wrap hidden">
      <div class="hlabel">SHIELD</div>
      <div class="bar-bg"><div id="shieldFill" class="bar-fill shield"></div></div>
    </div>
    <div id="rapidBar" class="bar-wrap hidden">
      <div class="hlabel">RAPID</div>
      <div class="bar-bg"><div id="rapidFill" class="bar-fill rapid"></div></div>
    </div>
  </div>

  <!-- Status pop -->
  <div id="banner"></div>

  <!-- START -->
  <div id="startScreen" class="overlay">
    <div class="logo-eyebrow">CYBER DIVISION · UNIT 7</div>
    <div class="logo">NEON<br>CHASE</div>
    <div class="logo-sub">INFINITE PURSUIT</div>
    <div class="start-keys">
      <span class="key">◀</span><span class="key">▶</span> Switch Lanes
    </div>
    <div class="powerup-legend">
      <span class="pu-badge shield">S</span> Shield &nbsp;·&nbsp;
      <span class="pu-badge rapid">R</span> Rapid &nbsp;·&nbsp;
      <span class="pu-badge life">♥</span> Life
    </div>
    <button id="startBtn" class="main-btn">▶ &nbsp;START CHASE</button>
    <p class="tagline">Dodge barriers · Collect power-ups · Chase forever</p>
  </div>

  <!-- GAME OVER -->
  <div id="goScreen" class="overlay hidden">
    <div class="go-label" id="goLabel">MISSION FAILED</div>
    <div class="go-big" id="goBig">ELIMINATED</div>
    <div class="go-stats" id="goStats"></div>
    <button class="main-btn" onclick="location.reload()">↺ &nbsp;RETRY</button>
  </div>

  <!-- Mobile touch buttons -->
  <div id="touch-ctrl" class="hidden">
    <button id="tLeft"  class="touch-btn">◀</button>
    <button id="tRight" class="touch-btn">▶</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
